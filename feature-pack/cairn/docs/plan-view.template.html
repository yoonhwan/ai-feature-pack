<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<title>cairn plan viewer</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
    --done:#238636; --doing:#d29922; --todo:#484f58; --accent:#1f6feb;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif}
  header{padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
  header h1{margin:0 0 4px;font-size:18px}
  header p{margin:0;color:var(--muted);font-size:13px}
  .tabs{display:flex;gap:4px;padding:12px 24px 0;flex-wrap:wrap}
  .tab{padding:8px 16px;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;
       background:var(--panel);color:var(--muted);cursor:pointer;font-size:13px;font-weight:500}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .view{display:none;padding:24px;animation:fade .2s}
  .view.active{display:block}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .legend{display:flex;gap:16px;margin-bottom:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .dot.done{background:var(--done)} .dot.doing{background:var(--doing)} .dot.todo{background:var(--todo)}
  code{background:var(--bg);padding:1px 6px;border-radius:5px;font-size:12px}

  /* people badges */
  .who{font-size:11px;color:var(--muted);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap}
  .who .wa{color:#79c0ff} .who .wr{color:#d2a8ff} .who .ww{color:#8b949e}

  /* Kanban */
  .kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .kcol{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;min-height:200px}
  .kcol h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between}
  .kcol h3 .cnt{color:var(--muted);font-weight:400}
  .kcard{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--todo);
         border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,transform .1s}
  .kcard:hover{border-color:var(--accent);transform:translateX(2px)}
  .kcard.done{border-left-color:var(--done)} .kcard.doing{border-left-color:var(--doing)}
  .kcard .ms{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px}
  .kcard .tid{font-size:11px;color:var(--muted);margin-top:4px}
  .kcard .tt{font-size:13px}
  .kcard .dep{font-size:11px;color:var(--doing);margin-top:4px}

  /* Outline tree */
  .tree{max-width:960px}
  .mile{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
  .mhead{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .mhead .mname{font-weight:600;font-size:15px}
  .mhead .mdate{font-size:11px;color:var(--muted)}
  .mhead .mdep{font-size:11px;color:var(--doing)}
  .mhead .spacer{flex:1}
  .pbar{height:6px;background:var(--todo);border-radius:3px;overflow:hidden;width:120px}
  .pbar > i{display:block;height:100%;background:var(--done)}
  .pct{font-size:12px;color:var(--muted);width:38px;text-align:right}
  .trow{padding:9px 16px 9px 40px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid #21262d;cursor:pointer}
  .trow:last-child{border-bottom:none}
  .trow:hover{background:#1c2333}
  .trow .tid{font-size:11px;color:var(--muted);min-width:34px;padding-top:1px}
  .trow .tbody{flex:1}
  .trow .dep{font-size:11px;color:var(--doing);margin-top:2px}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;white-space:nowrap}
  .badge.done{background:rgba(35,134,54,.2);color:#3fb950}
  .badge.doing,.badge.active{background:rgba(210,153,34,.2);color:#e3b341}
  .badge.todo,.badge.planned{background:rgba(72,79,88,.3);color:#8b949e}
  .badge.blocked{background:rgba(229,83,75,.2);color:#e5534b}

  /* mermaid wrap */
  .mermaid{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
  .mermaid .task,.mermaid .taskText,.mermaid rect.task{cursor:pointer}
  .mermaid g[id] .task{cursor:pointer}
  /* gantt 폰트 대비 */
  #dep .mermaid .sectionTitle{fill:#e6edf3 !important;font-weight:600}
  #dep .mermaid .titleText{fill:#e6edf3 !important;font-weight:700}
  #dep .mermaid .grid .tick text{fill:#8b949e !important}
  #dep .mermaid .grid path,#dep .mermaid .grid line{stroke:#30363d}
  #dep .mermaid .taskText{font-weight:600}
  /* gantt 스크롤 창 + 툴바 */
  /* 커스텀 HTML 간트 (schedule 타입) */
  .sg-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;color:var(--muted);font-size:12px}
  .sg-toolbar button{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;height:28px;min-width:30px;padding:0 10px;font-size:14px;cursor:pointer}
  .sg-toolbar button:hover{border-color:var(--accent)}
  .sg-toolbar .zlbl{color:var(--muted);font-size:11px;margin-left:4px}
  .sg-body{overflow:auto;max-height:70vh;border:1px solid var(--border);border-radius:12px;background:var(--panel);position:relative}
  .sg-inner{position:relative}
  .sg-row{display:flex;align-items:center;height:28px;border-bottom:1px solid #21262d}
  .sg-row.section{height:26px;background:rgba(255,255,255,0.045)}
  .sg-row.sg-axis{position:sticky;top:0;z-index:4;height:26px;background:var(--panel);border-bottom:1px solid var(--border)}
  .sg-label{position:sticky;left:0;z-index:3;width:230px;min-width:230px;height:100%;display:flex;align-items:center;gap:6px;
    padding:0 10px;background:var(--panel);border-right:1px solid var(--border);font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sg-row.section .sg-label{font-weight:600}
  .sg-track{position:relative;height:100%;flex:1}
  .sg-tick{position:absolute;top:0;height:100%;border-left:1px solid #21262d;padding-left:3px;font-size:10px;color:var(--muted);line-height:26px}
  .sg-tick.m{border-left-color:#3d444d;color:#c9d1d9}
  .sg-bar{position:absolute;top:5px;height:18px;border:1px solid;border-radius:5px;font-size:11px;line-height:16px;
    color:#fff;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .sg-bar.done{background:#238636;border-color:#3fb950}
  .sg-bar.doing{background:#a86e12;border-color:#e3b341}
  .sg-bar.todo{background:#3d444d;border-color:#6e7681}
  .sg-bar.blocked{background:#8e2b26;border-color:#e5534b}
  .sg-bar:hover{filter:brightness(1.15)}
  .sg-today{position:absolute;top:0;width:2px;background:#e5534b;z-index:2;pointer-events:none}
  .note{color:var(--muted);font-size:12px;margin-bottom:14px;max-width:820px;line-height:1.6}

  /* ledger dialog */
  dialog#taskModal{background:var(--panel);color:var(--text);border:1px solid var(--border);
    border-radius:14px;padding:0;max-width:660px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  dialog#taskModal::backdrop{background:rgba(0,0,0,.6)}
  .modalhead{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
  .modalhead .tid{color:var(--accent);font-weight:700;font-size:15px}
  .modalhead .mns{color:var(--muted);font-size:13px}
  .mclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px}
  .mclose:hover{color:var(--text)}
  .modalname{padding:16px 20px;font-size:15px;line-height:1.5;border-bottom:1px solid var(--border)}
  .mrow{display:flex;padding:9px 20px;border-bottom:1px solid #21262d;font-size:13px}
  .mrow:last-child{border-bottom:none}
  .mrow .mk{width:130px;color:var(--muted);flex-shrink:0}
  .mrow .mv{flex:1}
  .miss{color:#e5534b;font-style:italic}
  .ssotlink{color:var(--accent);text-decoration:none;font-weight:500;border:none;background:none;font:inherit;padding:0;cursor:pointer}
  .ssotlink:hover{text-decoration:underline}
  .copybtn{margin-left:8px;background:var(--bg);border:1px solid var(--border);color:var(--muted);
    border-radius:6px;padding:1px 8px;font-size:11px;cursor:pointer}
  .copybtn:hover{border-color:var(--accent);color:var(--text)}
</style>
</head><body>
<header>
  <h1>cairn plan viewer <span id="projname" style="color:var(--muted);font-weight:400;font-size:14px"></span></h1>
  <p>칸반 · 아웃라인 트리 · 워크트리/브랜치 — 카드/행 클릭 시 원장 상세</p>
</header>
<div class="tabs">
  <div class="tab active" data-v="kanban">① 칸반 (상태별)</div>
  <div class="tab" data-v="tree">② 아웃라인 트리 + 진행바</div>
  <div class="tab" data-v="dep" id="tab3">③ 워크트리 / 브랜치</div>
</div>

<div id="kanban" class="view active"></div>
<div id="tree" class="view"></div>
<div id="dep" class="view"></div>

<dialog id="taskModal"></dialog>

<script>
// ==== 원장 데이터 (생성기가 이 블록을 치환) ====
const plan = {
  project: "BYZ V6 Realtime Live",
  milestones: [
    {id:"ms1", name:"M0 Trigger Prep", status:"done", start:"2026-06-26", end:"2026-06-26", dep:[], tasks:[
      {id:"t1", s:"done", name:"SSOT: v6 live scope, role map, branch/worktree allocation, tool policy", dep:[], ssot:"/Users/yoonhwan/Project/Agent/BYZ-Work/BYZ-Agents/.worktrees/v6-realtime-live/.cairn/plan.yaml"},
      {id:"t2", s:"done", name:"BTS: log-spec-code triangulation checklist", dep:[]},
      {id:"t3", s:"done", name:"Baton: create isolated V6 worktree before implementation", dep:[]},
    ]},
    {id:"ms2", name:"M1 Backend Live Spine", status:"active", start:"2026-06-26", end:"2026-07-02", dep:[], tasks:[
      {id:"t4",  s:"done",  name:"Gateway: expose existing live SSE events with original and translation partials", dep:[]},
      {id:"t5",  s:"todo",  name:"Worker: live sentence splitter, polishing, retranslation, final confirmation flow", dep:[]},
      {id:"t15", s:"doing", name:"STT: GPU Qwen3 short-chunk language enforcement and semantic substitution rejection", dep:[]},
      {id:"t17", s:"todo",  name:"Gemini cache creation 블로킹 제거: translate_raw 32초 진범", dep:[]},
    ]},
    {id:"ms5", name:"V6 LST + Cache/Prompt Architecture", status:"active", start:"2026-07-02", end:"2026-07-03", dep:["ms2"], tasks:[
      {id:"t23", s:"todo", name:"B3 resolve_cache_path SSOT helper", dep:[]},
      {id:"t24", s:"todo", name:"B4 padding=base-prompt", dep:["t23"]},
      {id:"t25", s:"todo", name:"B1 polish node wiring", dep:["t24"]},
      {id:"t26", s:"todo", name:"Case3 LST", dep:["t25"]},
    ]},
  ]
};
// ==== 데이터 끝 ====

const SLABEL={done:"완료",doing:"진행중",todo:"대기",blocked:"블록"};
const allTasks=()=>plan.milestones.flatMap(m=>m.tasks.map(t=>({...t,ms:m.id,msName:m.name})));
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function whoLine(t){
  const p=[];
  if((t.assignees||[]).length) p.push(`<span class="wa">👤 ${t.assignees.map(esc).join(", ")}</span>`);
  if((t.reporters||[]).length) p.push(`<span class="wr">✍ ${t.reporters.map(esc).join(", ")}</span>`);
  if((t.watchers||[]).length)  p.push(`<span class="ww">👁 ${t.watchers.length}</span>`);
  return p.length?`<div class="who">${p.join("")}</div>`:"";
}
document.getElementById("projname").textContent=plan.project||"";
const SCHED=(plan.type==="schedule");
let schedRendered=false;

// ① Kanban
(function(){
  const cols={doing:[],todo:[],done:[],blocked:[]};
  allTasks().forEach(t=>(cols[t.s]||cols.todo).push(t));
  const order=[["doing","진행중 (Doing)"],["todo","대기 (Todo)"],["done","완료 (Done)"]];
  let h='<div class="legend"><span><i class="dot doing"></i>진행중</span><span><i class="dot todo"></i>대기</span><span><i class="dot done"></i>완료</span><span>카드 클릭 → 원장 상세</span></div><div class="kanban">';
  for(const [key,title] of order){
    const list=cols[key].concat(key==="todo"?cols.blocked:[]);
    h+=`<div class="kcol"><h3>${title}<span class="cnt">${list.length}</span></h3>`;
    list.forEach(t=>{
      const dep=t.dep&&t.dep.length?`<div class="dep">⟵ ${t.dep.join(", ")}</div>`:"";
      h+=`<div class="kcard ${t.s}" data-tid="${t.id}"><div class="ms">${t.ms} · ${esc(t.msName)}</div>`+
         `<div class="tt">${esc(t.name)}</div>${whoLine(t)}<div class="tid">${t.id} ›</div>${dep}</div>`;
    });
    h+="</div>";
  }
  document.getElementById("kanban").innerHTML=h+"</div>";
})();

// ② Outline tree
(function(){
  let h='<div class="note">프로젝트 › 마일스톤 › 태스크 계층. 마일스톤마다 완료율 진행바 · 일정 · 의존. 사람(👤작업자 ✍보고자 👁관찰자) 표기.</div><div class="tree">';
  plan.milestones.forEach(m=>{
    const done=m.tasks.filter(t=>t.s==="done").length, tot=m.tasks.length;
    const pct=tot?Math.round(done/tot*100):0;
    const mstat=m.status==='done'?'done':m.status==='active'?'active':m.status==='blocked'?'blocked':'planned';
    const dates=(m.start||m.end)?`<span class="mdate">📅 ${m.start||"—"} ~ ${m.end||"—"}</span>`:"";
    const mdep=m.dep&&m.dep.length?`<span class="mdep">⟵ ${m.dep.join(", ")}</span>`:"";
    h+=`<div class="mile"><div class="mhead"><span class="badge ${mstat}">${m.id}</span>`+
       `<span class="mname">${esc(m.name)}</span>${dates}${mdep}`+
       `<span class="spacer"></span><div class="pbar"><i style="width:${pct}%"></i></div><span class="pct">${pct}%</span></div>`;
    m.tasks.forEach(t=>{
      const dep=t.dep&&t.dep.length?`<div class="dep">⟵ 선행: ${t.dep.join(", ")}</div>`:"";
      h+=`<div class="trow" data-tid="${t.id}"><span class="tid">${t.id}</span>`+
         `<div class="tbody">${esc(t.name)}${whoLine(t)}${dep}</div>`+
         `<span class="badge ${t.s}">${SLABEL[t.s]||t.s}</span></div>`;
    });
    h+="</div>";
  });
  document.getElementById("tree").innerHTML=h+"</div>";
})();

// ③ 타입 분기: schedule=간트(일정) / work=워크트리·브랜치(gitGraph)
(function(){
  const tab3=document.getElementById("tab3");
  if(SCHED){
    tab3.textContent="③ 간트 (일정)";
    return;   // 렌더는 탭 최초 표시 때 지연 실행(하단 함수·const 초기화 후)
  }
  // work 타입 — 워크트리/브랜치 gitGraph
  tab3.textContent="③ 워크트리 / 브랜치";
  const short=t=>{const n=t.name.split(/[:：]/)[0].trim();return (n.length>14?n.slice(0,13)+"…":n);};
  const FEAT=plan.branch||"feat/"+ (plan.project||"project").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  let g="gitGraph\n";
  g+=`  commit id:"main"\n  branch "${FEAT}"\n  checkout "${FEAT}"\n  commit id:"worktree 생성"\n`;
  plan.milestones.forEach(m=>{
    g+=`  branch ${m.id}\n  checkout ${m.id}\n`;
    m.tasks.forEach(t=>{
      const lbl=`${t.id} ${short(t)}`;
      if(t.s==="done")       g+=`  commit id:"${lbl}" tag:"✓"\n`;
      else if(t.s==="doing") g+=`  commit id:"${lbl}" type:HIGHLIGHT\n`;
      else                   g+=`  commit id:"${lbl}" type:REVERSE\n`;
    });
    g+=`  checkout "${FEAT}"\n`;
    if(m.status==="done") g+=`  merge ${m.id} tag:"${m.id} merged"\n`;
  });
  const depNote=plan.milestones.filter(m=>m.dep&&m.dep.length).map(m=>`${m.id} ⟵ ${m.dep.join("+")}`).join(" · ");
  document.getElementById("dep").innerHTML=
    '<div class="note">작업 타입: <code>execution_ref/branch</code> 기반 브랜치 토폴로지(cairn <code>map</code>의 recovery-graph). 각 마일스톤이 브랜치로 fan-out, 완료(done)만 feature 브랜치로 merge. '+
    '<span style="color:var(--doing)">✓=완료 커밋 · 강조노드=진행중 · 역노드=대기</span></div>'+
    (depNote?`<div class="legend"><span>마일스톤 의존: ${depNote} (gitGraph 단일부모 한계로 텍스트 표기)</span></div>`:"")+
    `<pre class="mermaid">${g}</pre>`;
})();

// ==== 원장 다이얼로그 ====
const TASKMAP=Object.fromEntries(allTasks().map(t=>[t.id,t]));
const dlg=document.getElementById("taskModal");
function openTask(tid){
  const t=TASKMAP[tid]; if(!t)return;
  const badge=`<span class="badge ${t.s}">${SLABEL[t.s]||t.s}</span>`;
  const row=(k,v)=>`<div class="mrow"><span class="mk">${k}</span><span class="mv">${v}</span></div>`;
  const empty=`<span class="miss">미기록 (원장 빈 값 — link 훅 필요)</span>`;
  const nameList=a=>(a&&a.length)?a.map(esc).join(", "):"<span class='miss'>없음</span>";
  const dep=t.dep&&t.dep.length?t.dep.map(d=>`<code>${d}</code>`).join(", "):"<span class='miss'>없음</span>";
  const ssot=t.ssot
    ? `<button class="ssotlink" data-open="${t.ssot}" title="${t.ssot}">📄 ${t.ssot.split("/").pop()} 열기</button>`+
      `<button class="copybtn" data-copy="${t.ssot}">경로 복사</button>`
    : "<span class='miss'>미지정</span>";
  dlg.innerHTML=
    `<div class="modalhead"><div><span class="tid">${t.id}</span> · <span class="mns">${t.ms} ${esc(t.msName)}</span></div>`+
    `<button class="mclose" data-close="1">✕</button></div>`+
    `<div class="modalname">${esc(t.name)} ${badge}</div>`+
    row("상태", badge)+
    row("작업자 👤", nameList(t.assignees))+
    row("보고자 ✍", nameList(t.reporters))+
    row("관찰자 👁", nameList(t.watchers))+
    row("선행(depends_on)", dep)+
    row("기획 SSOT", ssot)+
    row("execution_ref", t.exec?`<code>${t.exec}</code>`:empty)+
    row("branch", t.branch?`<code>${t.branch}</code>`:empty)+
    row("start / due", `${t.start||"—"} / ${t.due||"—"}`)+
    (t.note?row("note", esc(t.note)):"");
  dlg.showModal();
}
function openSsot(path){
  if(location.protocol==="http:"||location.protocol==="https:"){
    fetch("/open?path="+encodeURIComponent(path)).then(r=>{if(!r.ok)throw 0;}).catch(()=>{
      navigator.clipboard?.writeText(path);
      alert("열기 실패 — 경로를 복사했어요:\n"+path);
    });
  } else {
    navigator.clipboard?.writeText(path);
    alert("브라우저 보안상 file:// 직접 열기는 막혀 있어요.\n서버 모드(cairn render --serve)에서 열립니다.\n경로를 클립보드에 복사했어요:\n"+path);
  }
}
dlg.addEventListener("click",e=>{
  if(e.target===dlg || e.target.dataset.close){ dlg.close(); return; }
  if(e.target.dataset.open){ openSsot(e.target.dataset.open); return; }
  if(e.target.dataset.copy){
    navigator.clipboard?.writeText(e.target.dataset.copy);
    e.target.textContent="복사됨 ✓"; setTimeout(()=>e.target.textContent="경로 복사",1200);
  }
});
document.body.addEventListener("click",e=>{
  if(e.target.closest("dialog"))return;
  const el=e.target.closest("[data-tid]");
  if(el) openTask(el.dataset.tid);
});

// tabs + lazy mermaid
window.openTask=openTask;   // mermaid gantt click 콜백에서 참조
mermaid.initialize({
  startOnLoad:false, securityLevel:"loose", theme:"dark",
  themeVariables:{
    fontSize:"13px",
    // gantt 바 (디자인 시스템 매핑, 대비 확보)
    taskBkgColor:"#3d444d", taskBorderColor:"#6e7681",
    activeTaskBkgColor:"#a86e12", activeTaskBorderColor:"#e3b341",
    doneTaskBkgColor:"#238636", doneTaskBorderColor:"#3fb950",
    critBkgColor:"#8e2b26", critBorderColor:"#e5534b",
    taskTextColor:"#ffffff", taskTextOutsideColor:"#e6edf3",
    taskTextDarkColor:"#ffffff", taskTextLightColor:"#ffffff", taskTextClickableColor:"#79c0ff",
    sectionBkgColor:"rgba(255,255,255,0.03)", sectionBkgColor2:"rgba(255,255,255,0.05)",
    altSectionBkgColor:"rgba(0,0,0,0)",
    gridColor:"#30363d", todayLineColor:"#e5534b", titleColor:"#e6edf3",
  },
  gantt:{useMaxWidth:false, barHeight:20, barGap:4, topPadding:40, leftPadding:120},
  flowchart:{nodeSpacing:30,rankSpacing:50},
});
const rendered={};
async function renderMermaid(view){
  if(rendered[view])return;
  const el=document.querySelector(`#${view} .mermaid`);
  if(el){ await mermaid.run({nodes:[el]}); rendered[view]=true; }
}
// ==== 커스텀 HTML 간트 (mermaid 아님 — 줌/마스크/오늘중앙 완전 통제) ====
const SG={px:14, min:null};              // px = 하루당 픽셀(줌 레벨)
const LABELW=230;
const dcount=(a,b)=>Math.round((b-a)/86400000);
function scheduleBounds(){
  const ds=[];
  plan.milestones.forEach(m=>{
    [m.start,m.end].forEach(x=>x&&ds.push(+new Date(x)));
    m.tasks.forEach(t=>[t.start,t.due].forEach(x=>x&&ds.push(+new Date(x))));
  });
  const min=new Date(Math.min(...ds)), max=new Date(Math.max(...ds));
  min.setDate(min.getDate()-3); max.setDate(max.getDate()+4);   // 좌우 여백
  return {min, max, days:dcount(min,max)+1};
}
function renderSchedule(){
  const {min,max,days}=scheduleBounds(); SG.min=min;
  const PX=SG.px, trackW=days*PX, innerW=LABELW+trackW;
  const dayX=d=>dcount(min,new Date(d))*PX;
  let ticks="";
  for(let i=0;i<=days;i+=7){
    const d=new Date(min); d.setDate(d.getDate()+i);
    const isMonth=d.getDate()<=7;
    ticks+=`<div class="sg-tick${isMonth?' m':''}" style="left:${i*PX}px">${d.getMonth()+1}/${d.getDate()}</div>`;
  }
  let rows="";
  plan.milestones.forEach(m=>{
    const mstat=m.status==='done'?'done':m.status==='active'?'doing':m.status==='blocked'?'blocked':'todo';
    rows+=`<div class="sg-row section"><div class="sg-label sec"><span class="badge ${mstat}">${m.id}</span> ${esc(m.name)}</div><div class="sg-track"></div></div>`;
    m.tasks.forEach(t=>{
      const s=t.start||m.start, e=t.due||m.end||s;
      const left=dayX(s), w=Math.max(PX,(dcount(new Date(s),new Date(e))+1)*PX);
      const who=(t.assignees||[]).length?" · 👤"+t.assignees.join(","):"";
      rows+=`<div class="sg-row" data-tid="${t.id}"><div class="sg-label" title="${esc(t.name)}">${t.id} ${esc(t.name)}</div>`+
            `<div class="sg-track"><div class="sg-bar ${t.s}" style="left:${left}px;width:${w}px" title="${esc(t.name)}${who}">${esc(t.name)}</div></div></div>`;
    });
  });
  const todayLeft=LABELW+dcount(min,new Date())*PX;
  document.getElementById("dep").innerHTML=
    '<div class="note">일정관리 타입: 실제 기간 기반 간트. 좌측 라벨 고정 · 타임라인만 마스킹 스크롤 · 확대/축소로 시간축 밀도 조절. 빨간선=오늘. 바 클릭 → 원장.</div>'+
    '<div class="legend"><span><i class="dot done"></i>완료</span><span><i class="dot doing"></i>진행중</span><span><i class="dot todo"></i>대기</span><span style="color:#e5534b">■ 블록(마감 넘김·막힘)</span></div>'+
    '<div class="sg-toolbar"><button id="gZoomOut" title="축소">－</button><button id="gZoomIn" title="확대">＋</button>'+
      `<span id="gZoomLbl" class="zlbl"></span><span style="flex:1"></span>`+
      '<button id="gPrev" title="반칸 왼쪽">‹</button><button id="gToday">오늘</button><button id="gNext" title="반칸 오른쪽">›</button></div>'+
    `<div class="sg-body" id="ganttscroll"><div class="sg-inner" style="width:${innerW}px">`+
      `<div class="sg-row sg-axis"><div class="sg-label sec"></div><div class="sg-track" style="width:${trackW}px">${ticks}</div></div>`+
      rows+
      `<div class="sg-today" id="sgToday" style="left:${todayLeft}px"></div>`+
    `</div></div>`;
  document.getElementById("gZoomLbl").textContent=PX+" px/일";
  wireSchedule();
}
function wireSchedule(){
  const scroll=document.getElementById("ganttscroll"); if(!scroll)return;
  const half=()=>scroll.clientWidth/2;
  document.getElementById("gPrev").onclick=()=>scroll.scrollBy({left:-half(),behavior:"smooth"});
  document.getElementById("gNext").onclick=()=>scroll.scrollBy({left:half(),behavior:"smooth"});
  document.getElementById("gToday").onclick=()=>centerToday("smooth");
  document.getElementById("gZoomIn").onclick=()=>{SG.px=Math.min(60,SG.px+6);renderSchedule();fixupSchedule();};
  document.getElementById("gZoomOut").onclick=()=>{SG.px=Math.max(4,SG.px-6);renderSchedule();fixupSchedule();};
}
function centerToday(behavior){
  const scroll=document.getElementById("ganttscroll"); if(!scroll||!SG.min)return;
  const x=LABELW+dcount(SG.min,new Date())*SG.px;
  scroll.scrollTo({left:Math.max(0,x-scroll.clientWidth/2),behavior:behavior||"auto"});
}
function fixupSchedule(){   // 뷰가 보일 때(clientWidth>0) 오늘선 높이 확정 + 오늘 중앙
  const inner=document.querySelector("#dep .sg-inner"), tl=document.getElementById("sgToday");
  if(inner&&tl) tl.style.height=inner.scrollHeight+"px";
  requestAnimationFrame(()=>centerToday("auto"));
}
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.v).classList.add("active");
    renderMermaid(tab.dataset.v);
    if(tab.dataset.v==="dep" && SCHED){ if(!schedRendered){renderSchedule();schedRendered=true;} fixupSchedule(); }
  };
});
</script>
